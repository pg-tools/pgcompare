<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pgcompare \u2014 \u041e\u0442\u0447\u0451\u0442 \u043f\u043e \u043e\u043f\u0442\u0438\u043c\u0438\u0437\u0430\u0446\u0438\u0438 PostgreSQL</title>
  <style>
    :root {
      --bg:           #f5f4f2;
      --surface:      #ffffff;
      --border:       #e5e7eb;
      --text:         #111827;
      --text-muted:   #6b7280;
      --text-light:   #9ca3af;
      --accent:       #1d4ed8;
      --accent-bg:    #eff6ff;
      --good-text:    #166534;
      --good-bg:      #dcfce7;
      --bad-text:     #991b1b;
      --bad-bg:       #fee2e2;
      --neutral-bg:   #f3f4f6;
      --code-bg:      #1e1e2e;
      --code-text:    #cdd6f4;
      --nav-h:        48px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.55; color: var(--text); background: var(--bg); }
    .nav { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: stretch; overflow-x: auto; scrollbar-width: none; height: var(--nav-h); }
    .nav::-webkit-scrollbar { display: none; }
    .nav-brand { display: flex; align-items: center; padding: 0 20px 0 16px; font-weight: 700; font-size: 13px; color: var(--text); letter-spacing: -0.2px; white-space: nowrap; border-right: 1px solid var(--border); flex-shrink: 0; text-decoration: none; }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; align-items: stretch; overflow-x: auto; scrollbar-width: none; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-link { display: flex; align-items: center; padding: 0 14px; white-space: nowrap; text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; flex-shrink: 0; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-link.is-query { font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; }
    .main { max-width: 880px; margin: 0 auto; padding: 40px 20px 80px; }
    .header { margin-bottom: 44px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .header-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .bench-params { display: flex; flex-wrap: wrap; gap: 6px; }
    .bench-param { font-size: 12px; font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; background: var(--neutral-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 9px; border-radius: 4px; }
    .section { margin-bottom: 48px; scroll-margin-top: calc(var(--nav-h) + 20px); }
    .section-label { font-size: 18px; font-weight: 700; color: var(--text); border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 18px; line-height: 1.2; }
    .warning-banner { display: flex; gap: 14px; align-items: flex-start; background: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid #ef4444; border-radius: 8px; padding: 16px 18px; }
    .warning-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
    .warning-title { font-weight: 700; color: var(--bad-text); margin-bottom: 3px; }
    .warning-body { font-size: 13px; color: #7f1d1d; line-height: 1.5; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .card + .card { margin-top: 20px; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--neutral-bg); }
    .card-query-name { font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 14px; font-weight: 600; color: var(--text); }
    .card-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .card-section:last-child { border-bottom: none; }
    .card-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-light); margin-bottom: 14px; }
    .opt-entry { padding: 22px 0; border-bottom: 1px solid var(--border); }
    .opt-entry:first-child { padding-top: 0; }
    .opt-entry:last-child { border-bottom: none; padding-bottom: 0; }
    .opt-query { display: inline-flex; align-items: center; font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-bg); border: 1px solid #bfdbfe; padding: 3px 10px; border-radius: 5px; margin-bottom: 16px; }
    .opt-field { margin-bottom: 14px; }
    .opt-field:last-child { margin-bottom: 0; }
    .opt-field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 5px; }
    .opt-field-value { color: var(--text); line-height: 1.6; }
    .opt-field-value pre { margin-top: 8px; background: #f6f8fa; color: #1f2328; border: 1px solid #d0d7de; padding: 14px 16px; border-radius: 6px; overflow-x: auto; font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; line-height: 1.65; }
    .opt-field-value code { font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; color: var(--text); background: var(--neutral-bg); padding: 1px 5px; border-radius: 3px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .badge-good    { background: var(--good-bg);    color: var(--good-text); }
    .badge-bad     { background: var(--bad-bg);     color: var(--bad-text); }
    .badge-neutral { background: var(--neutral-bg); color: var(--text-muted); }
    .badge-speedup { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; font-weight: 700; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .summary-table thead tr { background: var(--neutral-bg); border-bottom: 1px solid var(--border); }
    .summary-table th { padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); white-space: nowrap; }
    .summary-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .summary-table tbody tr:last-child td { border-bottom: none; }
    .summary-table tbody tr:hover td { background: #fafaf9; }
    .qname { font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; font-weight: 600; }
    .arrow { color: var(--text-light); padding: 0 5px; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stats-table thead tr { background: var(--neutral-bg); border-bottom: 1px solid var(--border); }
    .stats-table th { padding: 8px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .stats-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .stats-table tbody tr:last-child td { border-bottom: none; }
    .stats-table tbody tr:hover td { background: #fafaf9; }
    .stats-table .metric-name { font-weight: 600; color: var(--text-muted); font-size: 12px; }
    .stats-table .group-sep td { background: var(--neutral-bg); padding: 5px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); border-bottom: 1px solid var(--border); }
    details { margin-top: 2px; }
    summary { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text-muted); user-select: none; padding: 5px 0; list-style: none; }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: '\25B6'; font-size: 9px; transition: transform 0.18s ease; display: inline-block; }
    details[open] summary::before { transform: rotate(90deg); }
    summary:hover { color: var(--text); }
    .plan-trees { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    @media (max-width: 640px) { .plan-trees { grid-template-columns: 1fr; } }
    .plan-tree-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); margin-bottom: 8px; }
    .plan-summary { list-style: none; margin: 0 0 14px; padding: 0; display: flex; flex-direction: column; gap: 5px; }
    .plan-summary li { display: flex; align-items: baseline; gap: 8px; font-size: 13px; color: var(--text); }
    .plan-summary li::before { content: '\2192'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
    .plan-box { background: var(--code-bg); border-radius: 6px; padding: 14px; overflow-x: auto; }
    .plan-box pre { margin: 0; color: var(--code-text); font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 12px; line-height: 1.8; white-space: pre; }
    .footer { margin-top: 64px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--text-light); }
    .footer a { color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .footer a:hover { color: var(--text); }
    .footer-gh svg { width: 14px; height: 14px; fill: currentColor; }
  </style>
</head>
<body>

<nav class="nav" id="nav">
  <a href="#" class="nav-brand">pg<span>compare</span></a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="main" id="app"></div>

<script>
/* pgcompare report data — injected by Go */
window.reportData = (function() {
  var beforeStats = [];
  {{ range .Before.Stats }}beforeStats.push({QueryName:"{{ .QueryName }}",Min:{{ .Min.Microseconds }},Max:{{ .Max.Microseconds }},P50:{{ .P50.Microseconds }},P95:{{ .P95.Microseconds }},P99:{{ .P99.Microseconds }},Mean:{{ .Mean.Microseconds }},StdDev:{{ .StdDev.Microseconds }},QPS:{{ .QPS }},ErrorRate:{{ .ErrorRate }}});
  {{ end }}var afterStats = [];
  {{ range .After.Stats }}afterStats.push({QueryName:"{{ .QueryName }}",Min:{{ .Min.Microseconds }},Max:{{ .Max.Microseconds }},P50:{{ .P50.Microseconds }},P95:{{ .P95.Microseconds }},P99:{{ .P99.Microseconds }},Mean:{{ .Mean.Microseconds }},StdDev:{{ .StdDev.Microseconds }},QPS:{{ .QPS }},ErrorRate:{{ .ErrorRate }}});
  {{ end }}var diffs = [];
  {{ range .Diffs }}diffs.push({QueryName:"{{ .QueryName }}",Summary:[{{ range .Summary }}"{{ . }}",{{ end }}],BeforeText:"{{ renderPlan .Before }}",AfterText:"{{ renderPlan .After }}"});
  {{ end }}var speedups = [{{ range .Speedups }}{{ . }},{{ end }}];
  return {
    GeneratedAt: "{{ .GeneratedAt.Format "02.01.2006, 15:04:05" }}",
    Iterations: {{ .Iterations }},
    Concurrency: {{ .Concurrency }},
    Speedups: speedups,
    Description: "{{ .Description }}",
    Before: {Phase: "{{ .Before.Phase }}", Stats: beforeStats},
    After:  {Phase: "{{ .After.Phase }}",  Stats: afterStats},
    Diffs:  diffs
  };
})();

var slugify = function(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); };
var fmtMs   = function(us) { return (us / 1000).toFixed(1) + '\u00a0ms'; };
var fmtQPS  = function(q)  { return q.toFixed(1); };
var fmtErr  = function(e)  { return (e * 100).toFixed(2) + '%'; };
var esc     = function(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

function calcDelta(before, after, higherIsBetter) {
  if (before === 0) return { text: '\u2014', cls: 'badge-neutral' };
  var pct = (after - before) / before * 100;
  if (Math.abs(pct) < 0.5) return { text: '0.0%', cls: 'badge-neutral' };
  var good = higherIsBetter ? pct > 0 : pct < 0;
  return { text: (pct > 0 ? '+' : '') + pct.toFixed(1) + '%', cls: good ? 'badge-good' : 'badge-bad' };
}

function fmtSpeedup(f) {
  if (!f || f < 1.05) return { text: '1.0\u00d7', cls: 'badge-neutral' };
  return { text: f.toFixed(1) + '\u00d7', cls: 'badge-speedup' };
}

function badge(d) { return '<span class="badge ' + d.cls + '">' + esc(d.text) + '</span>'; }

function buildNavLinks(data) {
  var links = [
    { href: '#description', label: '\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435' },
    { href: '#summary',     label: '\u0421\u0432\u043e\u0434\u043a\u0430' }
  ].concat(data.Before.Stats.map(function(s) {
    return { href: '#query-' + slugify(s.QueryName), label: s.QueryName, cls: 'is-query' };
  }));
  return links.map(function(l) {
    return '<a href="' + l.href + '" class="nav-link ' + (l.cls || '') + '" data-href="' + l.href + '">' + esc(l.label) + '</a>';
  }).join('');
}

function buildHeader(data) {
  var params = '';
  if (data.Iterations) {
    params = '<div class="bench-params">'
      + '<span class="bench-param">iterations: ' + data.Iterations + '</span>'
      + '<span class="bench-param">concurrency: ' + data.Concurrency + '</span>'
      + '</div>';
  }
  return '<div class="header">'
    + '<h1>\u041e\u0442\u0447\u0451\u0442 \u043f\u043e \u043e\u043f\u0442\u0438\u043c\u0438\u0437\u0430\u0446\u0438\u0438 PostgreSQL</h1>'
    + '<div class="header-meta">Generated at ' + esc(data.GeneratedAt) + '</div>'
    + params
    + '</div>';
}

function buildDescription(data) {
  var inner = (data.Description && data.Description.trim())
    ? data.Description
    : '<div class="warning-banner"><div class="warning-icon">\u26a0</div><div>'
      + '<div class="warning-title">\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u043e\u043f\u0442\u0438\u043c\u0438\u0437\u0430\u0446\u0438\u0438 \u043d\u0435 \u0437\u0430\u043f\u043e\u043b\u043d\u0435\u043d\u043e</div>'
      + '<div class="warning-body">\u0417\u0430\u043f\u043e\u043b\u043d\u0438\u0442\u0435 description.yaml \u043f\u0435\u0440\u0435\u0434 \u0441\u0434\u0430\u0447\u0435\u0439 \u0440\u0430\u0431\u043e\u0442\u044b.</div>'
      + '</div></div>';
  return '<section class="section" id="description" data-section>'
    + '<div class="section-label">\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u043e\u043f\u0442\u0438\u043c\u0438\u0437\u0430\u0446\u0438\u0438</div>'
    + '<div class="card"><div class="card-section">' + inner + '</div></div>'
    + '</section>';
}

function buildSummary(data) {
  var rows = data.Before.Stats.map(function(b, i) {
    var a    = data.After.Stats[i];
    var p95d = calcDelta(b.P95, a.P95, false);
    var spd  = fmtSpeedup(data.Speedups[i]);
    var qpsd = calcDelta(b.QPS, a.QPS, true);
    return '<tr>'
      + '<td><span class="qname">' + esc(b.QueryName) + '</span></td>'
      + '<td>' + fmtMs(b.P95) + '<span class="arrow">\u2192</span>' + fmtMs(a.P95) + '</td>'
      + '<td>' + badge(p95d) + '</td>'
      + '<td>' + badge(spd)  + '</td>'
      + '<td>' + fmtQPS(b.QPS) + '<span class="arrow">\u2192</span>' + fmtQPS(a.QPS) + '</td>'
      + '<td>' + badge(qpsd) + '</td>'
      + '</tr>';
  }).join('');
  return '<section class="section" id="summary" data-section>'
    + '<div class="section-label">\u0421\u0432\u043e\u0434\u043a\u0430</div>'
    + '<div class="card"><table class="summary-table">'
    + '<thead><tr>'
    + '<th>\u0417\u0430\u043f\u0440\u043e\u0441</th>'
    + '<th>p95: \u0434\u043e \u2192 \u043f\u043e\u0441\u043b\u0435</th>'
    + '<th>p95 \u0394%</th>'
    + '<th>Speedup</th>'
    + '<th>QPS: \u0434\u043e \u2192 \u043f\u043e\u0441\u043b\u0435</th>'
    + '<th>QPS \u0394%</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div></section>';
}

function buildStatsRow(name, bVal, aVal, fmt, higher) {
  var d = calcDelta(bVal, aVal, higher);
  return '<tr>'
    + '<td class="metric-name">' + name + '</td>'
    + '<td style="color:var(--text-muted)">' + fmt(bVal) + '</td>'
    + '<td>' + fmt(aVal) + '</td>'
    + '<td>' + badge(d) + '</td></tr>';
}

function buildStatsTable(b, a, speedup) {
  speedup = fmtSpeedup(speedup);
  var stddevRow = (b.StdDev || a.StdDev)
    ? buildStatsRow('StdDev', b.StdDev, a.StdDev, fmtMs, false)
    : '';
  return '<table class="stats-table">'
    + '<thead><tr><th>\u041c\u0435\u0442\u0440\u0438\u043a\u0430</th><th>\u0414\u043e</th><th>\u041f\u043e\u0441\u043b\u0435</th><th>\u0394%</th></tr></thead>'
    + '<tbody>'
    + '<tr class="group-sep"><td colspan="4">Latency</td></tr>'
    + buildStatsRow('P50',  b.P50,  a.P50,  fmtMs, false)
    + buildStatsRow('P95',  b.P95,  a.P95,  fmtMs, false)
    + buildStatsRow('P99',  b.P99,  a.P99,  fmtMs, false)
    + buildStatsRow('Min',  b.Min,  a.Min,  fmtMs, false)
    + buildStatsRow('Max',  b.Max,  a.Max,  fmtMs, false)
    + buildStatsRow('Mean', b.Mean, a.Mean, fmtMs, false)
    + stddevRow
    + '<tr><td class="metric-name">Speedup</td><td style="color:var(--text-muted)">\u2014</td><td>\u2014</td><td>' + badge(speedup) + '</td></tr>'
    + '<tr class="group-sep"><td colspan="4">Throughput &amp; Reliability</td></tr>'
    + buildStatsRow('QPS',       b.QPS,       a.QPS,       fmtQPS, true)
    + buildStatsRow('ErrorRate', b.ErrorRate, a.ErrorRate, fmtErr, false)
    + '</tbody></table>';
}

function buildPlanDiff(diff) {
  if (!diff) return '';
  var summaryHtml = '';
  if (diff.Summary && diff.Summary.length) {
    summaryHtml = '<ul class="plan-summary">'
      + diff.Summary.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('')
      + '</ul>';
  }
  var planTrees = '';
  if (diff.BeforeText || diff.AfterText) {
    var before = diff.BeforeText ? '<div><div class="plan-tree-label">Before</div><div class="plan-box"><pre>' + esc(diff.BeforeText) + '</pre></div></div>' : '';
    var after  = diff.AfterText  ? '<div><div class="plan-tree-label">After</div><div class="plan-box"><pre>'  + esc(diff.AfterText)  + '</pre></div></div>' : '';
    planTrees = '<details><summary>\u041f\u043e\u043a\u0430\u0437\u0430\u0442\u044c \u043f\u043b\u0430\u043d\u044b \u0437\u0430\u043f\u0440\u043e\u0441\u043e\u0432</summary>'
      + '<div class="plan-trees">' + before + after + '</div></details>';
  }
  if (!summaryHtml && !planTrees) return '';
  return '<div class="card-section-label">Query Plan</div>' + summaryHtml + planTrees;
}

function buildQueryCard(b, a, diff, speedup) {
  var anchor = 'query-' + slugify(b.QueryName);
  return '<div class="card section" id="' + anchor + '" data-section>'
    + '<div class="card-header"><span class="card-query-name">' + esc(b.QueryName) + '</span></div>'
    + '<div class="card-section"><div class="card-section-label">\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043a\u0430</div>' + buildStatsTable(b, a, speedup) + '</div>'
    + '<div class="card-section">' + buildPlanDiff(diff) + '</div>'
    + '</div>';
}

function buildFooter(data) {
  var gh = '<svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>';
  return '<footer class="footer">'
    + '<span>Generated by pgcompare \u00b7 ' + esc(data.GeneratedAt) + '</span>'
    + '<a href="https://github.com/pg-tools/pgcompare" class="footer-gh" target="_blank" rel="noopener">' + gh + 'pg-tools/pgcompare</a>'
    + '</footer>';
}

function setupScrollSpy() {
  var links    = document.querySelectorAll('.nav-link[data-href]');
  var sections = document.querySelectorAll('[data-section]');
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        var id = '#' + e.target.id;
        links.forEach(function(l) { l.classList.toggle('active', l.dataset.href === id); });
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  sections.forEach(function(s) { obs.observe(s); });
}

(function() {
  var data = window.reportData;

  document.getElementById('nav-links').innerHTML = buildNavLinks(data);

  var cards = data.Before.Stats.map(function(b, i) {
    var a       = data.After.Stats[i];
    var diff    = (data.Diffs || []).filter(function(d) { return d.QueryName === b.QueryName; })[0] || null;
    var speedup = (data.Speedups || [])[i] || 0;
    return buildQueryCard(b, a, diff, speedup);
  }).join('');

  document.getElementById('app').innerHTML =
    buildHeader(data) + buildDescription(data) + buildSummary(data) + cards + buildFooter(data);

  setupScrollSpy();
})();
</script>
</body>
</html>
